<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraColor — Discover Your Color Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400;1,6..96,700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5f0e8;
  --ink: #0e0d0b;
  --gold: #b8965a;
  --muted: #8a8278;
  --serif: 'Bodoni Moda', Georgia, serif;
  --sans: 'Jost', sans-serif;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--sans);
}

/* =====================
   PAGES SYSTEM
   ===================== */
.page {
  position: fixed;
  inset: 0;
  display: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.page.active {
  display: flex;
  opacity: 1;
}
.page.exit {
  display: flex;
  opacity: 0;
  pointer-events: none;
}

/* =====================
   INTRO PAGE
   ===================== */
#page-intro {
  flex-direction: column;
  background: var(--ink);
  color: var(--cream);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  cursor: pointer;
}

.intro-eyebrow {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
}

.intro-title {
  font-family: var(--serif);
  font-size: clamp(64px, 12vw, 120px);
  font-weight: 700;
  font-style: italic;
  line-height: 0.9;
  letter-spacing: -2px;
  color: var(--cream);
  margin-bottom: 40px;
}

.intro-title em {
  font-style: normal;
  color: var(--gold);
}

.intro-sub {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 200;
  letter-spacing: 0.12em;
  color: rgba(245,240,232,0.5);
  margin-bottom: 64px;
  text-transform: uppercase;
}

.intro-cta {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream);
  border: 1px solid rgba(245,240,232,0.3);
  padding: 16px 36px;
  border-radius: 0;
  transition: all 0.3s;
  text-decoration: none;
  cursor: pointer;
  background: none;
}
.intro-cta:hover {
  background: var(--cream);
  color: var(--ink);
  border-color: var(--cream);
}
.intro-cta .arrow { transition: transform 0.3s; }
.intro-cta:hover .arrow { transform: translateX(6px); }

.intro-issue {
  position: absolute;
  bottom: 32px;
  right: 40px;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.2em;
  color: rgba(245,240,232,0.25);
  text-transform: uppercase;
}
/* =====================
   QUESTION PAGES
   ===================== */
.q-page {
  flex-direction: row;
  background: var(--cream);
}

/* LEFT PANEL — big number + question */
.q-left {
  width: 45%;
  background: var(--ink);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 48px 52px;
  position: relative;
  overflow: hidden;
}

.q-big-num {
  font-family: var(--serif);
  font-size: clamp(140px, 20vw, 220px);
  font-weight: 700;
  font-style: italic;
  line-height: 1;
  color: rgba(245,240,232,0.06);
  position: absolute;
  bottom: -20px;
  left: -10px;
  user-select: none;
  pointer-events: none;
}

.q-progress {
  display: flex;
  gap: 6px;
}
.q-progress-bar {
  height: 1px;
  flex: 1;
  background: rgba(245,240,232,0.15);
  transition: background 0.4s;
}
.q-progress-bar.done { background: var(--gold); }
.q-progress-bar.active { background: var(--cream); }

.q-content { position: relative; z-index: 1; }

.q-label {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}

.q-text {
  font-family: var(--serif);
  font-size: clamp(24px, 3.5vw, 40px);
  font-weight: 400;
  font-style: italic;
  line-height: 1.3;
  color: var(--cream);
}

.q-brand {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: rgba(245,240,232,0.25);
  letter-spacing: 1px;
}

/* RIGHT PANEL — options */
.q-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 64px;
  gap: 14px;
}

.q-instruction {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.opt-btn {
  display: flex;
  align-items: center;
  gap: 0;
  background: none;
  border: none;
  border-bottom: 1px solid rgba(14,13,11,0.1);
  padding: 20px 0;
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.opt-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 0; height: 100%;
  background: var(--ink);
  transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index: 0;
}
.opt-btn:hover::before { width: 100%; }

.opt-letter {
  font-family: var(--serif);
  font-size: 11px;
  font-style: italic;
  color: var(--muted);
  min-width: 28px;
  position: relative;
  z-index: 1;
  transition: color 0.25s;
}

.opt-text {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 300;
  color: var(--ink);
  position: relative;
  z-index: 1;
  transition: color 0.25s;
  letter-spacing: 0.02em;
}

.opt-arrow {
  margin-left: auto;
  font-size: 16px;
  color: rgba(14,13,11,0.2);
  position: relative;
  z-index: 1;
  transition: all 0.25s;
  transform: translateX(-8px);
  opacity: 0;
}

.opt-btn:hover .opt-letter,
.opt-btn:hover .opt-text { color: var(--cream); }
.opt-btn:hover .opt-arrow { color: var(--gold); opacity: 1; transform: translateX(0); }
