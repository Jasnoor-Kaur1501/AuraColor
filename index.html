<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraColor — Discover Your Color Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400;1,6..96,700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5f0e8;
  --ink: #0e0d0b;
  --gold: #b8965a;
  --muted: #8a8278;
  --serif: 'Bodoni Moda', Georgia, serif;
  --sans: 'Jost', sans-serif;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--sans);
}

/* =====================
   PAGES SYSTEM
   ===================== */
.page {
  position: fixed;
  inset: 0;
  display: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.page.active {
  display: flex;
  opacity: 1;
}
.page.exit {
  display: flex;
  opacity: 0;
  pointer-events: none;
}

/* =====================
   INTRO PAGE
   ===================== */
#page-intro {
  flex-direction: column;
  background: var(--ink);
  color: var(--cream);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  cursor: pointer;
}

.intro-eyebrow {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
}

.intro-title {
  font-family: var(--serif);
  font-size: clamp(64px, 12vw, 120px);
  font-weight: 700;
  font-style: italic;
  line-height: 0.9;
  letter-spacing: -2px;
  color: var(--cream);
  margin-bottom: 40px;
}

.intro-title em {
  font-style: normal;
  color: var(--gold);
}

.intro-sub {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 200;
  letter-spacing: 0.12em;
  color: rgba(245,240,232,0.5);
  margin-bottom: 64px;
  text-transform: uppercase;
}

.intro-cta {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream);
  border: 1px solid rgba(245,240,232,0.3);
  padding: 16px 36px;
  border-radius: 0;
  transition: all 0.3s;
  text-decoration: none;
  cursor: pointer;
  background: none;
}
.intro-cta:hover {
  background: var(--cream);
  color: var(--ink);
  border-color: var(--cream);
}
.intro-cta .arrow { transition: transform 0.3s; }
.intro-cta:hover .arrow { transform: translateX(6px); }

.intro-issue {
  position: absolute;
  bottom: 32px;
  right: 40px;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.2em;
  color: rgba(245,240,232,0.25);
  text-transform: uppercase;
}
/* =====================
   QUESTION PAGES
   ===================== */
.q-page {
  flex-direction: row;
  background: var(--cream);
}

/* LEFT PANEL — big number + question */
.q-left {
  width: 45%;
  background: var(--ink);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 48px 52px;
  position: relative;
  overflow: hidden;
}

.q-big-num {
  font-family: var(--serif);
  font-size: clamp(140px, 20vw, 220px);
  font-weight: 700;
  font-style: italic;
  line-height: 1;
  color: rgba(245,240,232,0.06);
  position: absolute;
  bottom: -20px;
  left: -10px;
  user-select: none;
  pointer-events: none;
}

.q-progress {
  display: flex;
  gap: 6px;
}
.q-progress-bar {
  height: 1px;
  flex: 1;
  background: rgba(245,240,232,0.15);
  transition: background 0.4s;
}
.q-progress-bar.done { background: var(--gold); }
.q-progress-bar.active { background: var(--cream); }

.q-content { position: relative; z-index: 1; }

.q-label {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}

.q-text {
  font-family: var(--serif);
  font-size: clamp(24px, 3.5vw, 40px);
  font-weight: 400;
  font-style: italic;
  line-height: 1.3;
  color: var(--cream);
}

.q-brand {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: rgba(245,240,232,0.25);
  letter-spacing: 1px;
}

/* RIGHT PANEL — options */
.q-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 64px;
  gap: 14px;
}

.q-instruction {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.opt-btn {
  display: flex;
  align-items: center;
  gap: 0;
  background: none;
  border: none;
  border-bottom: 1px solid rgba(14,13,11,0.1);
  padding: 20px 0;
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.opt-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 0; height: 100%;
  background: var(--ink);
  transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index: 0;
}
.opt-btn:hover::before { width: 100%; }

.opt-letter {
  font-family: var(--serif);
  font-size: 11px;
  font-style: italic;
  color: var(--muted);
  min-width: 28px;
  position: relative;
  z-index: 1;
  transition: color 0.25s;
}

.opt-text {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 300;
  color: var(--ink);
  position: relative;
  z-index: 1;
  transition: color 0.25s;
  letter-spacing: 0.02em;
}

.opt-arrow {
  margin-left: auto;
  font-size: 16px;
  color: rgba(14,13,11,0.2);
  position: relative;
  z-index: 1;
  transition: all 0.25s;
  transform: translateX(-8px);
  opacity: 0;
}

.opt-btn:hover .opt-letter,
.opt-btn:hover .opt-text { color: var(--cream); }
.opt-btn:hover .opt-arrow { color: var(--gold); opacity: 1; transform: translateX(0); }

/* =====================
   RESULT PAGE
   ===================== */
#page-result {
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--cream);
}

.result-hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
}

.result-palette-col {
  display: flex;
  flex-direction: column;
}

.palette-swatch {
  flex: 1;
  position: relative;
  transition: flex 0.4s ease;
  cursor: default;
}
.palette-swatch:hover { flex: 2.5; }

.swatch-name {
  position: absolute;
  bottom: 16px;
  left: 20px;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  opacity: 0;
  transition: opacity 0.3s;
}
.palette-swatch:hover .swatch-name { opacity: 1; }

.result-info-col {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 72px;
  background: var(--ink);
  color: var(--cream);
}

.result-issue {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
}

.result-aura-name {
  font-family: var(--serif);
  font-size: clamp(42px, 6vw, 72px);
  font-weight: 700;
  font-style: italic;
  line-height: 1.05;
  color: var(--cream);
  margin-bottom: 32px;
  letter-spacing: -1px;
}

.result-desc {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 200;
  line-height: 1.85;
  color: rgba(245,240,232,0.65);
  margin-bottom: 40px;
  max-width: 380px;
}

.result-traits {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 48px;
}

.trait-pill {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid rgba(184,150,90,0.4);
  padding: 7px 16px;
}

.result-btns {
  display: flex;
  gap: 12px;
}

.rbtn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 28px;
  cursor: pointer;
  transition: all 0.25s;
  border: none;
}

.rbtn-outline {
  background: none;
  border: 1px solid rgba(245,240,232,0.25);
  color: var(--cream);
}
.rbtn-outline:hover { border-color: var(--cream); }

.rbtn-fill {
  background: var(--gold);
  color: var(--ink);
}
.rbtn-fill:hover { background: var(--cream); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: var(--cream);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.1em;
  padding: 12px 24px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 999;
  text-transform: uppercase;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MOBILE */
@media (max-width: 700px) {
  .q-page { flex-direction: column; }
  .q-left { width: 100%; min-height: 220px; padding: 32px 28px; }
  .q-right { padding: 32px 28px; }
  .q-big-num { font-size: 120px; }
  .result-hero { grid-template-columns: 1fr; }
  .result-palette-col { min-height: 240px; flex-direction: row; }
  .result-info-col { padding: 48px 32px; }
  #page-intro { padding: 32px 24px; }
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="page active" id="page-intro" onclick="goToQ(0)">
  <div class="intro-eyebrow">An energy reading</div>
  <div class="intro-title">Aura<br><em>Color</em></div>
  <div class="intro-sub">Five questions · Your true palette</div>
  <button class="intro-cta">
    Begin the reading <span class="arrow">→</span>
  </button>
  <div class="intro-issue">Vol. II · Day 02 of 21</div>
</div>

<!-- QUESTION PAGES (generated by JS) -->

<!-- RESULT -->
<div class="page" id="page-result">
  <div class="result-hero">
    <div class="result-palette-col" id="resultPalette"></div>
    <div class="result-info-col">
      <div class="result-issue">Your aura · AuraColor</div>
      <div class="result-aura-name" id="resultName"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="result-traits" id="resultTraits"></div>
      <div class="result-btns">
        <button class="rbtn rbtn-outline" onclick="restart()">Retake</button>
        <button class="rbtn rbtn-fill" onclick="copyAura()">Copy aura</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const QUESTIONS = [
  {
    text: "It's a free Sunday. Where are you?",
    options: [
      { text: "Deep in a forest or near water", value: "earth" },
      { text: "A café with a book and good light", value: "air" },
      { text: "Creating something in my room", value: "fire" },
      { text: "Honestly, still in bed", value: "void" }
    ]
  },
  {
    text: "What energy do you bring to a room?",
    options: [
      { text: "Calm — people relax around me", value: "earth" },
      { text: "Curious — I ask the real questions", value: "air" },
      { text: "Intense — I make things happen", value: "fire" },
      { text: "Mysterious — I observe before I speak", value: "void" }
    ]
  },
  {
    text: "Your aesthetic in one word?",
    options: [
      { text: "Earthy", value: "earth" },
      { text: "Minimal", value: "air" },
      { text: "Bold", value: "fire" },
      { text: "Dark", value: "void" }
    ]
  },
  {
    text: "What time feels most like you?",
    options: [
      { text: "Golden hour — that 5pm warmth", value: "earth" },
      { text: "Just before sunrise, everything still", value: "air" },
      { text: "Midday — sharp and clear", value: "fire" },
      { text: "2am, when the world goes quiet", value: "void" }
    ]
  },
  {
    text: "A texture that matches your soul:",
    options: [
      { text: "Moss on old stone", value: "earth" },
      { text: "Linen moving in wind", value: "air" },
      { text: "Cracked sun-baked clay", value: "fire" },
      { text: "Still deep water", value: "void" }
    ]
  }
];
const AURAS = {
  earth: {
    name: "Moss\n& Amber",
    desc: "You carry the energy of old forests and late afternoon sun. People feel grounded around you. You move slowly but with intention — your presence makes a room feel safe.",
    traits: ["grounded", "patient", "nurturing", "quiet strength"],
    palette: [
      { color: "#3d2e18", name: "deep bark" },
      { color: "#7a5c35", name: "warm oak" },
      { color: "#c4a882", name: "sandstone" },
      { color: "#7a9e6e", name: "sage" },
      { color: "#3d5c38", name: "moss" }
    ]
  },
  air: {
    name: "Fog\n& Lavender",
    desc: "You exist slightly above the noise. Your mind is always between here and an idea not yet formed. People find you fascinating and hard to fully pin down — exactly as you like it.",
    traits: ["intellectual", "dreamy", "independent", "quietly magnetic"],
    palette: [
      { color: "#8c8aa0", name: "mist" },
      { color: "#6e6a8a", name: "lavender" },
      { color: "#b8b5cc", name: "haze" },
      { color: "#5c6e80", name: "slate" },
      { color: "#d8d5e8", name: "pearl" }
    ]
  },
  fire: {
    name: "Ember\n& Rust",
    desc: "You burn at a frequency most can't keep up with. When you care, it consumes you. You create things that didn't exist before you arrived. Rest is something you're still learning.",
    traits: ["passionate", "driven", "creative", "a lot (in a good way)"],
    palette: [
      { color: "#5c1a00", name: "deep ember" },
      { color: "#a83010", name: "rust" },
      { color: "#d4602a", name: "amber" },
      { color: "#e89050", name: "glow" },
      { color: "#2e0e00", name: "char" }
    ]
  },
  void: {
    name: "Ink\n& Indigo",
    desc: "You live in the depth. Where others see darkness, you find texture. You feel everything — you've simply learned not to perform it. Your inner world is vast and rare.",
    traits: ["deep", "perceptive", "intense", "selectively open"],
    palette: [
      { color: "#08080f", name: "midnight" },
      { color: "#14102e", name: "deep indigo" },
      { color: "#2a2058", name: "violet" },
      { color: "#1a2848", name: "abyss" },
      { color: "#382e50", name: "dusk" }
    ]
  }
};

let current = 0;
let scores = { earth: 0, air: 0, fire: 0, void: 0 };
let resultKey = null;
const letters = ["A", "B", "C", "D"];

function buildQPages() {
  QUESTIONS.forEach((q, i) => {
    const page = document.createElement("div");
    page.className = "page q-page";
    page.id = `page-q${i}`;

    const bars = QUESTIONS.map((_, j) =>
      `<div class="q-progress-bar ${j < i ? 'done' : j === i ? 'active' : ''}"></div>`
    ).join("");

    const opts = q.options.map((o, oi) => `
      <button class="opt-btn" onclick="answer('${o.value}', ${i})">
        <span class="opt-letter">${letters[oi]}.</span>
        <span class="opt-text">${o.text}</span>
        <span class="opt-arrow">→</span>
      </button>
    `).join("");

    page.innerHTML = `
      <div class="q-left">
        <div class="q-progress">${bars}</div>
        <div class="q-content">
          <div class="q-label">Question ${i + 1} of ${QUESTIONS.length}</div>
          <div class="q-text">${q.text}</div>
        </div>
        <div class="q-brand">AuraColor</div>
        <div class="q-big-num">${i + 1}</div>
      </div>
      <div class="q-right">
        <div class="q-instruction">Choose one</div>
        ${opts}
      </div>
    `;
    document.body.insertBefore(page, document.getElementById("page-result"));
  });
}

function showPage(id) {
  const all = document.querySelectorAll(".page");
  all.forEach(p => {
    if (p.classList.contains("active")) {
      p.classList.add("exit");
      p.classList.remove("active");
      setTimeout(() => p.classList.remove("exit"), 650);
    }
  });
  setTimeout(() => {
    const next = document.getElementById(id);
    if (next) next.classList.add("active");
  }, 100);
}

function goToQ(i) { showPage(`page-q${i}`); }

function answer(value, qIndex) {
  scores[value]++;
  const next = qIndex + 1;
  if (next < QUESTIONS.length) {
    goToQ(next);
  } else {
    showResult();
  }
}

function showResult() {
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  resultKey = top;
  const aura = AURAS[top];

  document.getElementById("resultName").textContent = aura.name;
  document.getElementById("resultDesc").textContent = aura.desc;

  const traits = document.getElementById("resultTraits");
  traits.innerHTML = aura.traits.map(t => `<span class="trait-pill">${t}</span>`).join("");

  const pal = document.getElementById("resultPalette");
  pal.innerHTML = aura.palette.map(s =>
    `<div class="palette-swatch" style="background:${s.color}">
      <div class="swatch-name">${s.name}</div>
    </div>`
  ).join("");

  showPage("page-result");
}

function restart() {
  scores = { earth: 0, air: 0, fire: 0, void: 0 };
  resultKey = null;
  showPage("page-intro");
}

function copyAura() {
  if (!resultKey) return;
  const a = AURAS[resultKey];
  const text = `My aura is ${a.name.replace("\n", " ")} ✨\n\n${a.desc}\n\nTraits: ${a.traits.join(", ")}\n\nDiscover yours → AuraColor`;
  navigator.clipboard.writeText(text).then(() => toast("Aura copied ✦"));
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

buildQPages();
</script>
</body>
</html>
