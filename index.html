<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraColor — Discover Your Color Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400;1,6..96,700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5f0e8;
  --ink: #0e0d0b;
  --gold: #b8965a;
  --muted: #8a8278;
  --serif: 'Bodoni Moda', Georgia, serif;
  --sans: 'Jost', sans-serif;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--sans);
}

/* =====================
   PAGES SYSTEM
   ===================== */
.page {
  position: fixed;
  inset: 0;
  display: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.page.active {
  display: flex;
  opacity: 1;
}
.page.exit {
  display: flex;
  opacity: 0;
  pointer-events: none;
}

/* =====================
   INTRO PAGE
   ===================== */
#page-intro {
  flex-direction: column;
  background: var(--ink);
  color: var(--cream);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  cursor: pointer;
}

.intro-eyebrow {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
}

.intro-title {
  font-family: var(--serif);
  font-size: clamp(64px, 12vw, 120px);
  font-weight: 700;
  font-style: italic;
  line-height: 0.9;
  letter-spacing: -2px;
  color: var(--cream);
  margin-bottom: 40px;
}

.intro-title em {
  font-style: normal;
  color: var(--gold);
}

.intro-sub {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 200;
  letter-spacing: 0.12em;
  color: rgba(245,240,232,0.5);
  margin-bottom: 64px;
  text-transform: uppercase;
}

.intro-cta {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream);
  border: 1px solid rgba(245,240,232,0.3);
  padding: 16px 36px;
  border-radius: 0;
  transition: all 0.3s;
  text-decoration: none;
  cursor: pointer;
  background: none;
}
.intro-cta:hover {
  background: var(--cream);
  color: var(--ink);
  border-color: var(--cream);
}
.intro-cta .arrow { transition: transform 0.3s; }
.intro-cta:hover .arrow { transform: translateX(6px); }

.intro-issue {
  position: absolute;
  bottom: 32px;
  right: 40px;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.2em;
  color: rgba(245,240,232,0.25);
  text-transform: uppercase;
}
